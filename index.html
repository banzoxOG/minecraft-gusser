<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Mob Guesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4ade80;
    --green-dark: #16a34a;
    --green-dim: #166534;
    --red: #f87171;
    --red-dark: #991b1b;
    --yellow: #facc15;
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #16213e;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #64748b;
    --pixel: 'Press Start 2P', monospace;
    --vt: 'VT323', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--vt);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--surface2);
    border: 2px solid var(--green);
    border-radius: 10px;
    margin-bottom: 16px;
    position: relative;
  }

  .header-icon { font-size: 36px; }

  .header-title {
    font-family: var(--pixel);
    font-size: 11px;
    color: var(--green);
    line-height: 1.7;
  }

  .header-sub {
    font-size: 20px;
    color: #86efac;
    margin-top: 2px;
  }

  .header-timer {
    margin-left: auto;
    font-family: var(--pixel);
    font-size: 11px;
    color: var(--yellow);
    background: var(--bg);
    border: 2px solid var(--yellow);
    border-radius: 6px;
    padding: 8px 12px;
    min-width: 80px;
    text-align: center;
  }

  /* ── MAIN GAME AREA ── */
  .game {
    width: 100%;
    max-width: 900px;
    display: flex;
    gap: 14px;
    min-height: 480px;
  }

  /* ── LEFT: MOB PANEL ── */
  .mob-panel {
    width: 210px;
    flex-shrink: 0;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .mob-panel-label {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--muted);
    letter-spacing: 1px;
    align-self: flex-start;
  }

  .mob-img-box {
    width: 150px;
    height: 150px;
    border: 3px solid var(--green);
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    image-rendering: pixelated;
    transition: border-color 0.3s;
  }

  .mob-img-box.guessing { border-color: var(--yellow); animation: pulse 0.8s ease infinite alternate; }
  .mob-img-box.correct  { border-color: var(--green); }
  .mob-img-box.wrong    { border-color: var(--red); }

  @keyframes pulse { from { box-shadow: 0 0 0 0 rgba(250,204,21,0.4); } to { box-shadow: 0 0 0 8px rgba(250,204,21,0); } }

  .mob-img-box img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    image-rendering: pixelated;
    transition: opacity 0.3s;
  }

  .mob-img-box .question-mark {
    font-size: 80px;
    color: var(--border);
    font-family: var(--pixel);
    line-height: 1;
  }

  .mob-name-display {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--green);
    text-align: center;
    word-break: break-word;
    line-height: 1.6;
    min-height: 28px;
  }

  .mob-count-badge {
    font-size: 16px;
    color: var(--muted);
    text-align: center;
  }

  .possible-list-wrap {
    width: 100%;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .possible-item {
    font-size: 15px;
    color: #475569;
    padding: 2px 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .possible-item.highlight { color: var(--green); font-size: 16px; }

  /* ── RIGHT: QUESTION PANEL ── */
  .question-panel {
    flex: 1;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-label {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--muted);
    white-space: nowrap;
  }

  .q-step {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .q-text {
    font-size: 28px;
    color: var(--text);
    line-height: 1.3;
    min-height: 70px;
    display: flex;
    align-items: center;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--pixel);
    font-size: 9px;
    padding: 12px 22px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    letter-spacing: 1px;
  }

  .btn:active { transform: scale(0.95); }

  .btn-yes  { background: #14532d; color: #bbf7d0; border-color: var(--green); }
  .btn-yes:hover  { background: var(--green-dark); }

  .btn-no   { background: #450a0a; color: #fecaca; border-color: var(--red); }
  .btn-no:hover   { background: var(--red-dark); }

  .btn-guess { background: #1e3a5f; color: #bae6fd; border-color: #38bdf8; font-size: 8px; padding: 10px 16px; }
  .btn-guess:hover { background: #1e40af; }

  .btn-restart { background: transparent; color: var(--muted); border-color: var(--border); font-size: 8px; padding: 10px 14px; }
  .btn-restart:hover { border-color: #64748b; color: var(--text); }

  .history-box {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 150px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .history-label {
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .history-item {
    font-size: 16px;
    color: #475569;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }

  .ans-y { color: var(--green); }
  .ans-n { color: var(--red); }

  /* ── GUESS SCREEN (replaces question area) ── */
  .guess-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 18px;
    text-align: center;
  }

  .guess-label {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--yellow);
    letter-spacing: 2px;
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .guess-mob-name {
    font-family: var(--pixel);
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
  }

  .guess-sub {
    font-size: 22px;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.3;
  }

  .result-btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-correct {
    background: #064e3b;
    color: #a7f3d0;
    border: 2px solid #34d399;
    font-family: var(--pixel);
    font-size: 8px;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn-correct:hover { background: #065f46; }

  .btn-wrong {
    background: #4c0519;
    color: #fecdd3;
    border: 2px solid #fb7185;
    font-family: var(--pixel);
    font-size: 8px;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn-wrong:hover { background: var(--red-dark); }

  /* ── WIN / FAIL SCREENS ── */
  .end-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    text-align: center;
    animation: pop 0.4s ease;
  }

  @keyframes pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .end-title {
    font-family: var(--pixel);
    font-size: 16px;
    line-height: 1.6;
  }

  .end-title.win  { color: var(--green); }
  .end-title.fail { color: var(--red); font-size: 12px; }

  .end-score {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--yellow);
    background: var(--bg);
    border: 2px solid var(--yellow);
    border-radius: 6px;
    padding: 10px 20px;
    line-height: 1.8;
  }

  .end-mob-img {
    width: 120px;
    height: 120px;
    border: 3px solid var(--green);
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    image-rendering: pixelated;
  }

  .end-mob-img img { width: 100px; height: 100px; object-fit: contain; image-rendering: pixelated; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 14px;
    font-size: 16px;
    color: #334155;
    text-align: center;
  }

  .footer a { color: #475569; text-decoration: none; }
  .footer a:hover { color: var(--green); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 620px) {
    .game { flex-direction: column; }
    .mob-panel { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; }
    .mob-img-box { width: 110px; height: 110px; }
    .possible-list-wrap { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⛏️</div>
  <div>
    <div class="header-title">MINECRAFT<br>MOB GUESSER</div>
    <div class="header-sub">Think of a mob — I'll guess it!</div>
  </div>
  <div class="header-timer" id="timer">00:00</div>
</div>

<div class="game" id="game">

  <!-- LEFT: mob identity panel -->
  <div class="mob-panel" id="mob-panel">
    <div class="mob-panel-label">MY BEST GUESS</div>
    <div class="mob-img-box" id="mob-img-box">
      <span class="question-mark">?</span>
    </div>
    <div class="mob-name-display" id="mob-name-display">???</div>
    <div class="mob-count-badge" id="mob-count"></div>
    <div class="possible-list-wrap" id="possible-list"></div>
  </div>

  <!-- RIGHT: question panel -->
  <div class="question-panel" id="question-panel">

    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-label" id="prog-label">STEP 0</span>
    </div>

    <div class="q-step" id="q-step">QUESTION 1 — NARROWING DOWN...</div>
    <div class="q-text" id="q-text">Loading...</div>

    <div class="btn-row" id="btn-row">
      <button class="btn btn-yes"  id="btn-yes"  onclick="answer(true)">✔ YES</button>
      <button class="btn btn-no"   id="btn-no"   onclick="answer(false)">✘ NO</button>
      <button class="btn btn-guess" onclick="forceGuess()">⚡ GUESS NOW</button>
      <button class="btn btn-restart" onclick="restart()">↺ RESTART</button>
    </div>

    <div class="history-box" id="history-box">
      <div class="history-label">ANSWER HISTORY</div>
    </div>

  </div>
</div>

<div class="footer">
  Data &amp; images from <a href="https://minecraft.wiki/w/Mob" target="_blank">minecraft.wiki</a> &nbsp;·&nbsp;
  <a href="https://github.com/banzoxog/minecraft-gusser" target="_blank">View on GitHub</a>
</div>

// Remove duplicate mobs by name
const seen = new Set();
const MOBS_CLEAN = MOBS.filter(m => { if (seen.has(m.name)) return false; seen.add(m.name); return true; });

const IMG_BASE = "https://minecraft.wiki/images/";

// ─────────────────────────────────────────
//  QUESTION BANK
// ─────────────────────────────────────────
// Each question: { text, key, val }
// key = mob property, val = expected value for YES
// If all remaining mobs have the same value → question is skipped automatically
const QUESTIONS = [
  { text: "Is it a hostile mob (attacks you on sight)?",   key: "hostile",    val: true  },
  { text: "Is it a passive mob (never attacks)?",          key: "passive",    val: true  },
  { text: "Does it live in the Nether?",                   key: "nether",     val: true  },
  { text: "Does it live in The End?",                      key: "end",        val: true  },
  { text: "Is it an aquatic/water mob?",                   key: "aquatic",    val: true  },
  { text: "Is it undead (zombie, skeleton, etc.)?",        key: "undead",     val: true  },
  { text: "Can it fly?",                                   key: "flying",     val: true  },
  { text: "Is it a boss mob?",                             key: "boss",       val: true  },
  { text: "Is it an animal (real-life animal basis)?",     key: "animal",     val: true  },
  { text: "Is it a humanoid (walks upright like a person)?", key: "humanoid", val: true  },
  { text: "Is it tameable or domesticated?",               key: "tameable",   val: true  },
  { text: "Can you ride it?",                              key: "rideable",   val: true  },
  { text: "Is it a neutral mob (only attacks if provoked)?", key: "neutral",  val: true  },
  { text: "Is it an arthropod (spider, bee, silverfish…)?", key: "arthropod", val: true  },
  { text: "Is it an illager (vindicator, evoker, pillager…)?", key: "illager",val: true  },
  { text: "Is it small in size (smaller than a player)?",  key: "size",       val: "small" },
  { text: "Is it large in size (bigger than a player)?",   key: "size",       val: "large" },
  { text: "Does it spawn from a spawner block?",           key: "spawner",    val: true  },
];

// ─────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────
let state = {
  possible: [],
  qIndex: 0,
  qOrder: [],
  history: [],
  questionCount: 0,
  timerInterval: null,
  seconds: 0,
  phase: "playing",   // playing | guessing | win | fail
  guessIndex: 0,
};

function imgUrl(mob) {
  return IMG_BASE + mob.img;
}

function getTopMob(pool) {
  return pool[0] || null;
}

// Returns the next question index that actually differentiates the current pool
function nextUsefulQuestion(pool, usedIdx) {
  for (let i = 0; i < QUESTIONS.length; i++) {
    if (usedIdx.has(i)) continue;
    const q = QUESTIONS[i];
    const yes = pool.filter(m => m[q.key] === q.val).length;
    const no  = pool.length - yes;
    // Skip if question doesn't split (all same answer)
    if (yes === 0 || no === 0) continue;
    return i;
  }
  return -1; // no useful question left
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
function init() {
  state.possible = [...MOBS_CLEAN];
  state.qOrder   = [];
  state.usedQ    = new Set();
  state.history  = [];
  state.questionCount = 0;
  state.seconds  = 0;
  state.phase    = "playing";
  state.guessIndex = 0;

  // Clear timer
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.seconds++;
    const m = String(Math.floor(state.seconds / 60)).padStart(2, "0");
    const s = String(state.seconds % 60).padStart(2, "0");
    document.getElementById("timer").textContent = `${m}:${s}`;
  }, 1000);

  updateMobPanel(null);
  showQuestionPanel();
  renderHistory();
  findAndShowNextQuestion();
}

function restart() { init(); }

// ─────────────────────────────────────────
//  QUESTION FLOW
// ─────────────────────────────────────────
function findAndShowNextQuestion() {
  if (state.possible.length === 1) { doGuess(); return; }
  if (state.possible.length === 0) { doFail(); return; }

  const qi = nextUsefulQuestion(state.possible, state.usedQ);
  if (qi === -1 || state.questionCount >= 20) { doGuess(); return; }

  state.currentQI = qi;
  state.usedQ.add(qi);
  state.questionCount++;

  const q = QUESTIONS[qi];
  const prog = Math.min(100, (state.questionCount / 12) * 100);

  document.getElementById("prog-fill").style.width = prog + "%";
  document.getElementById("prog-label").textContent = "STEP " + state.questionCount;
  document.getElementById("q-step").textContent = "QUESTION " + state.questionCount + " — NARROWING DOWN...";
  document.getElementById("q-text").textContent = q.text;

  // Update mob panel to show top candidate
  updateMobPanel(getTopMob(state.possible));
  updatePossibleList(state.possible);
}

function answer(isYes) {
  if (state.phase !== "playing") return;

  const q = QUESTIONS[state.currentQI];
  const ansText = isYes ? "YES" : "NO";

  // Filter pool
  if (isYes) {
    state.possible = state.possible.filter(m => m[q.key] === q.val);
  } else {
    state.possible = state.possible.filter(m => m[q.key] !== q.val);
  }

  // Record history
  state.history.push({ q: q.text, a: ansText });
  renderHistory();

  findAndShowNextQuestion();
}

function forceGuess() {
  if (state.phase !== "playing") return;
  doGuess();
}

// ─────────────────────────────────────────
//  GUESSING
// ─────────────────────────────────────────
function doGuess() {
  state.phase = "guessing";
  state.guessIndex = 0;
  clearInterval(state.timerInterval);

  if (state.possible.length === 0) { doFail(); return; }

  showGuessScreen(state.possible[state.guessIndex]);
}

function guessWrong() {
  state.guessIndex++;
  if (state.guessIndex >= state.possible.length) {
    doFail();
  } else {
    showGuessScreen(state.possible[state.guessIndex]);
  }
}

function guessCorrect() {
  state.phase = "win";
  doWin(state.possible[state.guessIndex]);
}

// ─────────────────────────────────────────
//  UI SCREENS
// ─────────────────────────────────────────
function showQuestionPanel() {
  const qp = document.getElementById("question-panel");
  qp.innerHTML = `
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-label" id="prog-label">STEP 0</span>
    </div>
    <div class="q-step" id="q-step">QUESTION 1 — NARROWING DOWN...</div>
    <div class="q-text" id="q-text">Loading...</div>
    <div class="btn-row" id="btn-row">
      <button class="btn btn-yes" onclick="answer(true)">✔ YES</button>
      <button class="btn btn-no"  onclick="answer(false)">✘ NO</button>
      <button class="btn btn-guess" onclick="forceGuess()">⚡ GUESS NOW</button>
      <button class="btn btn-restart" onclick="restart()">↺ RESTART</button>
    </div>
    <div class="history-box" id="history-box">
      <div class="history-label">ANSWER HISTORY</div>
    </div>
  `;
}

function showGuessScreen(mob) {
  updateMobPanel(mob, "guessing");
  const qp = document.getElementById("question-panel");
  qp.innerHTML = `
    <div class="guess-screen">
      <div class="guess-label">MY GUESS IS...</div>
      <div class="guess-mob-name">${mob.name}</div>
      <div class="guess-sub">Are you thinking of ${mob.name}?</div>
      <div class="result-btn-row">
        <button class="btn-correct" onclick="guessCorrect()">✔ YES, CORRECT!</button>
        <button class="btn-wrong"   onclick="guessWrong()">✘ NO, WRONG</button>
      </div>
      <div style="margin-top:4px">
        <button class="btn btn-restart" onclick="restart()">↺ START OVER</button>
      </div>
    </div>
  `;
}

function doWin(mob) {
  updateMobPanel(mob, "correct");
  const qp = document.getElementById("question-panel");
  qp.innerHTML = `
    <div class="end-screen">
      <div class="end-title win">I GOT IT!</div>
      <div class="end-mob-img">
        <img src="${imgUrl(mob)}" alt="${mob.name}" onerror="this.style.display='none'">
      </div>
      <div style="font-family:var(--pixel);font-size:12px;color:#4ade80">${mob.name}</div>
      <div class="end-score">
        QUESTIONS ASKED: ${state.questionCount}<br>
        MOBS REMAINING: ${state.possible.length}
      </div>
      <button class="btn btn-restart" onclick="restart()" style="margin-top:4px">↺ PLAY AGAIN</button>
    </div>
  `;
}

function doFail() {
  state.phase = "fail";
  clearInterval(state.timerInterval);
  updateMobPanel(null);
  const qp = document.getElementById("question-panel");
  qp.innerHTML = `
    <div class="end-screen">
      <div class="end-title fail">YOU GOT ME!<br>I COULDN'T GUESS!</div>
      <div class="end-score">QUESTIONS ASKED: ${state.questionCount}</div>
      <div class="guess-sub" style="font-size:20px;color:var(--muted)">What mob were you thinking of?<br>We might need to add it!</div>
      <button class="btn btn-restart" onclick="restart()" style="margin-top:8px">↺ PLAY AGAIN</button>
    </div>
  `;
}

// ─────────────────────────────────────────
//  SIDE PANEL UPDATES
// ─────────────────────────────────────────
function updateMobPanel(mob, state_class) {
  const box  = document.getElementById("mob-img-box");
  const name = document.getElementById("mob-name-display");
  const cnt  = document.getElementById("mob-count");

  box.className = "mob-img-box" + (state_class ? " " + state_class : "");

  if (mob) {
    box.innerHTML = `<img src="${imgUrl(mob)}" alt="${mob.name}" onerror="this.parentNode.innerHTML='<span class=\\'question-mark\\'>?</span>'">`;
    name.textContent = mob.name;
  } else {
    box.innerHTML = `<span class="question-mark">?</span>`;
    name.textContent = "???";
  }

  cnt.textContent = state.possible.length + " mob" + (state.possible.length !== 1 ? "s" : "") + " left";
}

function updatePossibleList(pool) {
  const el = document.getElementById("possible-list");
  if (!el) return;
  el.innerHTML = pool.slice(0, 12).map((m, i) =>
    `<div class="possible-item${i < 3 ? ' highlight' : ''}">${i === 0 ? '▶ ' : '· '}${m.name}</div>`
  ).join("") + (pool.length > 12 ? `<div class="possible-item">...and ${pool.length - 12} more</div>` : "");
}

function renderHistory() {
  const box = document.getElementById("history-box");
  if (!box) return;
  box.innerHTML = `<div class="history-label">ANSWER HISTORY</div>` +
    state.history.slice(-8).map(h =>
      `<div class="history-item"><span class="ans-${h.a === 'YES' ? 'y' : 'n'}">${h.a}</span><span>${h.q}</span></div>`
    ).join("");
  box.scrollTop = box.scrollHeight;
}

// ─────────────────────────────────────────
//  START
// ─────────────────────────────────────────
init();
</script>
</body>
</html>
